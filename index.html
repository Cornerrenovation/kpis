<!doctype html>
<html lang="en" data-theme="auto">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="color-scheme" content="light dark" />
<meta name="robots" content="noindex, nofollow" />
<title>Corner — Growth & Design KPIs</title>
<style>
  :root{
    --bg:#f6f7f9; --panel:#ffffff; --ink:#10131a; --ink-soft:#3c4452;
    --muted:#6b7280; --faint:#9aa1ad; --line:#e7e9ee; --line-soft:#eef0f4;
    --accent:#4f46e5; --accent-soft:#eef0fe; --accent-ink:#4338ca;
    --green:#0f9d58; --green-bg:#e7f6ee; --amber:#b9770a; --amber-bg:#fdf2e1;
    --blue:#2563eb; --blue-bg:#e8effd; --grey:#7a818c; --grey-bg:#eef0f3;
    --shadow:0 1px 2px rgba(16,19,26,.04),0 4px 16px rgba(16,19,26,.05);
    --radius:14px;
  }
  html[data-theme="dark"]{
    --bg:#0d0f14; --panel:#161922; --ink:#eef1f6; --ink-soft:#c4cad6;
    --muted:#9aa1ad; --faint:#6b7280; --line:#262b36; --line-soft:#1e222c;
    --accent:#8b87ff; --accent-soft:#20223a; --accent-ink:#b6b3ff;
    --green:#46d18a; --green-bg:#15271d; --amber:#e0a23c; --amber-bg:#2a2113;
    --blue:#6ea0ff; --blue-bg:#16223c; --grey:#9aa1ad; --grey-bg:#222732;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 6px 22px rgba(0,0,0,.35);
  }
  @media (prefers-color-scheme: dark){
    html[data-theme="auto"]{
      --bg:#0d0f14; --panel:#161922; --ink:#eef1f6; --ink-soft:#c4cad6;
      --muted:#9aa1ad; --faint:#6b7280; --line:#262b36; --line-soft:#1e222c;
      --accent:#8b87ff; --accent-soft:#20223a; --accent-ink:#b6b3ff;
      --green:#46d18a; --green-bg:#15271d; --amber:#e0a23c; --amber-bg:#2a2113;
      --blue:#6ea0ff; --blue-bg:#16223c; --grey:#9aa1ad; --grey-bg:#222732;
      --shadow:0 1px 2px rgba(0,0,0,.3),0 6px 22px rgba(0,0,0,.35);
    }
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg);color:var(--ink);
    font:15px/1.5 ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  .wrap{max-width:1200px;margin:0 auto;padding:26px 20px 72px}
  a{color:var(--accent)}

  /* Header */
  header.top{display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:14px;margin-bottom:18px}
  .brand{display:flex;flex-direction:column;gap:3px}
  .brand .eyebrow{font-size:11.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--accent-ink)}
  h1{font-size:24px;margin:0;letter-spacing:-.4px;font-weight:760}
  .sub{color:var(--muted);font-size:13px}
  .top-right{display:flex;align-items:center;gap:10px}
  .theme-btn{appearance:none;border:1px solid var(--line);background:var(--panel);color:var(--ink-soft);
    width:34px;height:34px;border-radius:9px;cursor:pointer;font-size:15px;line-height:1;box-shadow:var(--shadow)}
  .theme-btn:hover{border-color:var(--accent)}

  /* Meta strip */
  .meta{display:flex;flex-wrap:wrap;gap:9px 16px;align-items:center;
    margin:0 0 18px;padding:11px 14px;background:var(--panel);
    border:1px solid var(--line);border-radius:12px;font-size:12.5px;box-shadow:var(--shadow)}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:7px;vertical-align:middle}
  .dot.ok{background:var(--green)} .dot.stale{background:#d2453a}
  .meta .sep{color:var(--line)}
  .src{color:var(--muted)} .src b{color:var(--ink-soft);font-weight:650}
  .scope-tag{margin-left:auto;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
    padding:3px 9px;border-radius:999px}
  .scope-internal{color:var(--amber);background:var(--amber-bg)}
  .scope-public{color:var(--green);background:var(--green-bg)}

  /* Period tabs */
  .tabs{display:flex;flex-wrap:wrap;gap:7px;margin:0 0 20px}
  .tab{appearance:none;border:1px solid var(--line);background:var(--panel);color:var(--ink-soft);
    padding:8px 15px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;transition:.12s;box-shadow:var(--shadow)}
  .tab:hover{border-color:var(--accent)}
  .tab[aria-selected="true"]{background:var(--accent);border-color:var(--accent);color:#fff}
  .tab .k{font-weight:500;opacity:.7;font-size:11.5px;margin-left:5px}

  /* Funnel */
  .funnel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:18px 20px 20px;margin-bottom:22px;box-shadow:var(--shadow)}
  .funnel h2{font-size:14px;margin:0 0 3px;letter-spacing:-.1px}
  .funnel .cap{color:var(--muted);font-size:12px;margin:0 0 16px}
  .fstage{display:grid;grid-template-columns:140px 1fr 92px;align-items:center;gap:14px;margin:9px 0}
  .flabel{font-size:13px;font-weight:600;color:var(--ink-soft);text-align:right}
  .fbarwrap{background:var(--line-soft);border-radius:9px;height:38px;overflow:hidden;position:relative}
  .fbar{height:100%;border-radius:9px;display:flex;align-items:center;padding:0 12px;min-width:42px;
    background:linear-gradient(90deg,var(--accent),#7c75f0);color:#fff;font-weight:700;font-size:15px;
    transition:width .5s cubic-bezier(.2,.7,.2,1)}
  .fbar.s1{filter:saturate(1)} .fbar.s2{opacity:.92} .fbar.s3{opacity:.84} .fbar.s4{opacity:.76}
  .fconv{font-size:12.5px;color:var(--muted)}
  .fconv b{color:var(--green);font-weight:700}
  .fconv.low b{color:var(--amber)}
  .ftop{color:var(--faint)}
  .fstage-wrap{border-radius:10px;margin:2px 0}
  .fstage-wrap>summary{list-style:none;cursor:pointer;outline:none}
  .fstage-wrap>summary::-webkit-details-marker{display:none}
  .fstage-wrap>summary .flabel::before{content:"▸ ";color:var(--accent);font-weight:700}
  .fstage-wrap[open]>summary .flabel::before{content:"▾ "}
  .fstage-wrap[open]{background:var(--line-soft)}
  .fstage-wrap>summary:hover .fbar{filter:brightness(1.07)}
  .fcustlist{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:0 20px;padding:4px 14px 12px 154px}
  .fcustlist span{font-size:12px;color:var(--ink-soft);padding:4px 0;border-top:1px solid var(--line-soft)}
  @media(max-width:560px){.fstage{grid-template-columns:96px 1fr 64px;gap:9px}.flabel{font-size:12px}
    .fcustlist{padding-left:96px;grid-template-columns:1fr}}

  /* Sections + cards */
  section{margin:22px 0}
  .secthead{display:flex;align-items:baseline;gap:10px;margin:0 2px 12px;padding-bottom:7px;border-bottom:1px solid var(--line)}
  .secthead h2{font-size:15px;margin:0;letter-spacing:-.1px}
  section.team .secthead h2{color:var(--accent-ink)}
  .secthead .owner{color:var(--muted);font-size:12px}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
  @media(max-width:1080px){.grid{grid-template-columns:repeat(3,1fr)}}
  @media(max-width:720px){.grid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:440px){.grid{grid-template-columns:1fr}}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px 14px 12px;display:flex;flex-direction:column;min-height:130px;box-shadow:var(--shadow);transition:.12s}
  .card:hover{border-color:var(--line);transform:translateY(-1px)}
  .card .label{font-size:12px;color:var(--muted);font-weight:650;margin-bottom:9px;line-height:1.3}
  .card .val{font-size:28px;font-weight:740;letter-spacing:-.6px;line-height:1}
  .card .val .unit{font-size:12.5px;color:var(--muted);font-weight:600;margin-left:4px;letter-spacing:0}
  .card.time .val{color:var(--blue)}
  .card.dim .val{color:var(--faint)}
  .card .foot{margin-top:auto;padding-top:11px}
  .badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.04em;padding:3px 7px;border-radius:999px;text-transform:uppercase}
  .badge.live{color:var(--green);background:var(--green-bg)}
  .badge.snapshot{color:var(--blue);background:var(--blue-bg)}
  .badge.proxy{color:var(--amber);background:var(--amber-bg)}
  .badge.needs_connection,.badge.error{color:var(--grey);background:var(--grey-bg)}
  .card .source{font-size:10.5px;color:var(--faint);margin-top:7px;line-height:1.35}
  .card .source .dc{color:var(--faint)}
  .note{font-size:10.5px;color:var(--faint);margin-top:6px;font-style:italic;line-height:1.35}
  .srcwrap{margin-top:9px}
  .srcwrap>summary{list-style:none;cursor:pointer;outline:none;user-select:none;
    font-size:10.5px;font-weight:700;letter-spacing:.02em;color:var(--muted)}
  .srcwrap>summary::-webkit-details-marker{display:none}
  .srcwrap>summary::before{content:"▸ ";color:var(--faint);font-weight:700}
  .srcwrap[open]>summary::before{content:"▾ "}
  .srcwrap .source{margin-top:6px}
  .cust{margin-top:9px}
  .cust summary{cursor:pointer;color:var(--accent);font-size:11.5px;font-weight:650;list-style:none;outline:none;user-select:none}
  .cust summary::-webkit-details-marker{display:none}
  .cust summary::before{content:"▸ "}
  .cust[open] summary::before{content:"▾ "}
  .custlist{margin-top:6px;display:flex;flex-direction:column;max-height:220px;overflow:auto}
  .custlist span{font-size:11.5px;color:var(--ink-soft);padding:3px 0;border-top:1px solid var(--line-soft)}
  .custlist span:first-child{border-top:none}
  footer{margin-top:34px;color:var(--muted);font-size:11.5px;text-align:center;line-height:1.6}

  /* Mode tabs + KPIs view */
  .modetabs{display:inline-flex;background:var(--line-soft);border:1px solid var(--line);border-radius:999px;padding:4px;gap:4px;margin:0 0 18px}
  .modetab{appearance:none;border:0;background:transparent;color:var(--muted);font:inherit;font-size:13.5px;font-weight:650;padding:7px 22px;border-radius:999px;cursor:pointer;transition:.12s}
  .modetab[aria-selected="true"]{background:var(--accent);color:#fff}
  .kpi-hero{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);margin-bottom:12px}
  .kh-top{display:flex;justify-content:space-between;align-items:center;font-size:12.5px;color:var(--muted);font-weight:650}
  .kh-pct{font-weight:700}
  .kpi-hero.g .kh-pct{color:var(--green)}.kpi-hero.a .kh-pct{color:var(--amber)}.kpi-hero.r .kh-pct{color:#d2453a}
  .kh-num{font-size:34px;font-weight:760;letter-spacing:-.8px;margin:6px 0 10px}
  .kh-num span{font-size:14px;color:var(--muted);font-weight:600;letter-spacing:0}
  .kh-sub{font-size:11.5px;color:var(--faint);margin-top:8px}
  .ktrack{height:10px;background:var(--line-soft);border-radius:999px;overflow:hidden}
  .ktrack.sm{height:7px;margin-top:8px}
  .kfill{height:100%;border-radius:999px;transition:width .5s}
  .kfill.g{background:var(--green)}.kfill.a{background:var(--amber)}.kfill.r{background:#d2453a}
  .kpi-grid .card{min-height:auto}
  .kc-sub{font-size:11.5px;color:var(--muted);margin-top:3px}
  .kpitable{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);font-size:13.5px}
  .kpitable th,.kpitable td{padding:10px 14px;text-align:right;border-bottom:1px solid var(--line-soft)}
  .kpitable th:first-child,.kpitable td:first-child{text-align:left}
  .kpitable th{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);font-weight:700;background:var(--line-soft)}
  .kpitable tbody tr:last-child td{border-bottom:0}
  .kpitable td.g{color:var(--green);font-weight:700}.kpitable td.a{color:var(--amber);font-weight:700}.kpitable td.r{color:#d2453a;font-weight:700}
  .kpitable td.neg{color:#d2453a}.kpitable td.pos{color:var(--green)}
  .kpitable tr.rate td{color:var(--muted);font-style:italic}
  .kpitable tr.kpi-row td{font-weight:750;background:var(--accent-soft);border-top:1px solid var(--line)}
  .prog{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow)}
  .prow{display:grid;grid-template-columns:150px 1fr 52px;align-items:center;gap:12px;margin:8px 0}
  .plabel{font-size:12.5px;color:var(--ink-soft);font-weight:600;text-align:right}
  .ptrack{height:24px;background:var(--line-soft);border-radius:7px;overflow:hidden}
  .pfill{height:100%;border-radius:7px;min-width:2px;transition:width .6s cubic-bezier(.2,.7,.2,1)}
  .pfill.g{background:linear-gradient(90deg,var(--green),#3fbf7a)}.pfill.a{background:linear-gradient(90deg,var(--amber),#e0a23c)}.pfill.r{background:linear-gradient(90deg,#d2453a,#e0685f)}
  .ppct{font-size:12.5px;font-weight:700;color:var(--ink-soft)}
  @media(max-width:560px){.prow{grid-template-columns:88px 1fr 44px}.kpitable{font-size:12px}.kpitable th,.kpitable td{padding:8px}}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brand">
      <span class="eyebrow">Corner Renovation</span>
      <h1>Growth &amp; Design KPIs</h1>
      <span class="sub" id="subtitle"></span>
    </div>
    <div class="top-right">
      <button class="theme-btn" id="theme-btn" title="Toggle theme" aria-label="Toggle theme">◐</button>
    </div>
  </header>

  <div class="meta">
    <span><span class="dot" id="fresh-dot"></span><b id="fresh-text">loading…</b></span>
    <span class="sep">|</span>
    <span class="src">Sources: <b id="src-repo">repo</b> · <b id="src-slack">slack</b> · <b id="src-gmail">gmail</b></span>
    <span class="scope-tag" id="scope-tag"></span>
  </div>

  <div class="modetabs" id="modetabs" role="tablist">
    <button class="modetab" data-mode="metrics" role="tab">Metrics</button>
    <button class="modetab" data-mode="kpis" role="tab">KPIs</button>
  </div>

  <div id="metrics-view">
    <div class="tabs" id="tabs" role="tablist"></div>
    <div id="funnel"></div>
    <div id="root"></div>
  </div>

  <div id="kpis-view" hidden>
    <div class="tabs" id="kpi-months" role="tablist"></div>
    <div id="kpi-body"></div>
  </div>

  <footer id="footer"></footer>
</div>

<script src="data/data.js"></script>
<script>
(function () {
  var D = window.KPI_DATA, root = document.getElementById("root");
  if (!D || !D.periods) { root.innerHTML = "<p>No data. Run <code>python3 dashboard/collect.py</code>.</p>"; return; }

  // ---- theme ----
  var html = document.documentElement, saved = null;
  try { saved = localStorage.getItem("corner-kpi-theme"); } catch (e) {}
  if (saved) html.setAttribute("data-theme", saved);
  document.getElementById("theme-btn").onclick = function () {
    var cur = html.getAttribute("data-theme");
    var next = cur === "dark" ? "light" : "dark";
    html.setAttribute("data-theme", next);
    try { localStorage.setItem("corner-kpi-theme", next); } catch (e) {}
  };

  // ---- meta ----
  var ageH = (Date.now() - new Date(D.as_of).getTime()) / 3.6e6;
  var fd = document.getElementById("fresh-dot"), ft = document.getElementById("fresh-text");
  var fresh = ageH <= (D.refresh_window_hours || 168) + 24;
  fd.className = "dot " + (fresh ? "ok" : "stale");
  ft.textContent = (fresh ? "Fresh · updated " : "Stale · updated ") + fmtAge(ageH);
  setSrc("src-repo", D.sources.repo); setSrc("src-slack", D.sources.slack); setSrc("src-gmail", D.sources.gmail);
  var isPublic = D.scope === "public";
  var st = document.getElementById("scope-tag");
  st.className = "scope-tag " + (isPublic ? "scope-public" : "scope-internal");
  st.textContent = isPublic ? "Public · aggregate only" : "Internal · includes client names";
  document.getElementById("footer").innerHTML =
    "Refreshes Mondays 10:00 (São Paulo). " +
    (isPublic ? "Aggregate figures only — no client data." :
      "Internal — drill-downs include client names, keep private.") +
    "<br>generated " + esc(D.as_of_human);

  // ---- period state ----
  var state = D.default_period || D.periods[0].key;

  var tabs = document.getElementById("tabs");
  D.periods.forEach(function (p) {
    var b = document.createElement("button");
    b.className = "tab"; b.setAttribute("role", "tab");
    b.innerHTML = esc(p.label) + (p.kind === "month" ? '<span class="k">month</span>' :
      '<span class="k">rolling</span>');
    b.onclick = function () { state = p.key; render(); };
    b.dataset.key = p.key;
    tabs.appendChild(b);
  });

  function period() { return D.periods.filter(function (p) { return p.key === state; })[0] || D.periods[0]; }

  function render() {
    var p = period();
    [].forEach.call(tabs.children, function (b) {
      b.setAttribute("aria-selected", b.dataset.key === state ? "true" : "false");
    });
    document.getElementById("subtitle").textContent =
      p.label + " · " + fmtDate(p.start) + " – " + fmtDate(p.end) +
      " · activity by event date" + (isPublic ? "" : " · click a metric for the customers");
    renderFunnel(p);
    root.innerHTML = "";
    p.dashboards.forEach(function (dash) {
      var sec = document.createElement("section");
      if (dash.id === "team") sec.className = "team";
      sec.innerHTML = '<div class="secthead"><h2>' + esc(dash.title) +
        '</h2><span class="owner">' + esc(dash.owner || "") + "</span></div>";
      var grid = document.createElement("div"); grid.className = "grid";
      dash.metrics.forEach(function (m) { grid.appendChild(card(m)); });
      sec.appendChild(grid); root.appendChild(sec);
    });
  }

  // ---- funnel ----
  function renderFunnel(p) {
    var stages = (p.funnel && p.funnel.stages) || [];
    var max = Math.max.apply(null, stages.map(function (s) { return s.value; }).concat([1]));
    var rows = stages.map(function (s, i) {
      var prev = i > 0 ? stages[i - 1].value : null;
      var conv = (prev && prev > 0) ? Math.round(s.value / prev * 100) : null;
      var low = conv !== null && conv < 60;
      var convHtml = conv === null ? '<span class="ftop">— top of funnel</span>'
        : '<b>' + conv + "%</b> of prev";
      var w = Math.max(4, Math.round(s.value / max * 100));
      var cs = s.customers || [];
      var row =
        '<div class="flabel">' + esc(s.label) + "</div>" +
        '<div class="fbarwrap"><div class="fbar s' + (i + 1) + '" style="width:' + w + '%">' +
          s.value + "</div></div>" +
        '<div class="fconv' + (low ? " low" : "") + '">' + convHtml + "</div>";
      if (!cs.length) return '<div class="fstage">' + row + "</div>";
      return '<details class="fstage-wrap"><summary class="fstage">' + row + "</summary>" +
        '<div class="fcustlist">' +
        cs.map(function (c) { return "<span>" + esc(c) + "</span>"; }).join("") +
        "</div></details>";
    }).join("");
    document.getElementById("funnel").innerHTML =
      '<div class="funnel"><h2>Conversion funnel</h2>' +
      '<p class="cap">Discovery booked → made → proposals → $500 paid · activity in period ' +
      (isPublic ? "" : "· click a stage to see the customers ") +
      "(stages can overlap across periods, so a step may exceed the one before).</p>" +
      rows + "</div>";
  }

  // ---- card ----
  function card(m) {
    var el = document.createElement("div");
    var kind = m.unit === "days" ? " time" : "";
    el.className = "card" + kind + (m.value === null || m.value === undefined ? " dim" : "");
    var second = m.secondary ? '<div class="second">' + esc(m.secondary) + "</div>" : "";
    var dc = m.double_check ? ' <span class="dc">· check: ' + esc(m.double_check) + "</span>" : "";
    var note = m.note ? '<div class="note">' + esc(m.note) + "</div>" : "";
    var cust = (m.customers && m.customers.length)
      ? '<details class="cust"><summary>' + m.customers.length + " customer" +
        (m.customers.length > 1 ? "s" : "") + '</summary><div class="custlist">' +
        m.customers.map(function (c) { return "<span>" + esc(c) + "</span>"; }).join("") +
        "</div></details>" : "";
    var srcBlock = '<details class="srcwrap"><summary>Sources &amp; comments</summary>' +
      '<div class="source">' + esc(m.source) + dc + "</div>" + note + "</details>";
    el.innerHTML =
      '<div class="label">' + esc(m.label) + "</div>" +
      '<div class="val">' + fmtVal(m) + "</div>" + second + cust +
      '<div class="foot"><span class="badge ' + m.status + '">' + badge(m) + "</span>" +
      srcBlock + "</div>";
    return el;
  }

  function fmtVal(m) {
    if (m.value === null || m.value === undefined) return "—";
    if (m.unit === "$") return "$" + Number(m.value).toLocaleString();
    if (m.unit === "%") return m.value + '<span class="unit">%</span>';
    return Number(m.value).toLocaleString() + '<span class="unit">' + esc(m.unit) + "</span>";
  }
  function badge(m){ return {live:"Live",proxy:"Proxy",snapshot:"Snapshot",
      needs_connection:"Not connected",error:"Error"}[m.status] || m.status; }
  function setSrc(id, s){ var e=document.getElementById(id);
    e.textContent = e.textContent + " (" + String(s).replace("needs_connection","off") + ")"; }
  function fmtAge(h){ return h<1?Math.max(1,Math.round(h*60))+"m ago":h<48?Math.round(h)+"h ago":Math.round(h/24)+"d ago"; }
  function fmtDate(iso){ var d=new Date(iso+"T00:00:00");
    return d.toLocaleDateString("en-US",{month:"short",day:"numeric"}); }
  function esc(s){ return String(s).replace(/[&<>"]/g,function(c){
      return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];}); }

  // ===== KPIs tab =====
  var KPI = {avg:43050, c5:0.2415, c10:0.90, bookToConduct:0.95, conductToProp:0.70, securedDesigner:56250, goalStart:"2026-07"};
  var DES = [["agustina","Agustina"],["suelen","Suelen"],["bruna","Bruna"],["lais","Laís"]];
  var STAGES = [
    ["booked","Discoveries booked","Discovery booked"],
    ["conducted","Discoveries conducted","Discovery calls conducted"],
    ["proposals","Proposals conducted","Proposal calls conducted"],
    ["deposits","$500 deposits","$500 deposits"],
    ["tenpct","Projects to 10%","10% payments"]
  ];
  function kpiTargets(n){
    var secured=KPI.securedDesigner*n, tenpct=secured/KPI.avg, deposits=tenpct/KPI.c10, proposals=deposits/KPI.c5;
    var conducted=proposals/KPI.conductToProp, booked=conducted/KPI.bookToConduct;
    return {booked:booked,conducted:conducted,proposals:proposals,deposits:deposits,tenpct:tenpct,secured:secured,
            conv:KPI.c5*100, b2c:KPI.bookToConduct*100, c2p:KPI.conductToProp*100};
  }
  function mval(dash,prefix){ if(!dash) return 0;
    for(var i=0;i<dash.metrics.length;i++){ if(dash.metrics[i].label.indexOf(prefix)===0) return dash.metrics[i].value||0; } return 0; }
  function pcl(p){ return p>=80?"g":(p>=50?"a":"r"); }
  function r1(v){ return Math.round(v*10)/10; }

  var monthPeriods = D.periods.filter(function(p){return p.kind==="month";});
  var monthKeys = monthPeriods.map(function(p){return p.key;});
  if(monthKeys.indexOf(KPI.goalStart)<0) monthKeys.push(KPI.goalStart);
  monthKeys.sort();
  function mPeriod(k){ return monthPeriods.filter(function(x){return x.key===k;})[0]||null; }
  function mLabel(k){ var p=mPeriod(k); if(p) return p.label;
    var a=k.split("-"); return new Date(a[0],a[1]-1,1).toLocaleDateString("en-US",{month:"short",year:"numeric"}); }
  function eActuals(per,eid){ var d=per?per.dashboards.filter(function(x){return x.id===eid;})[0]:null;
    var a={}; STAGES.forEach(function(s){ a[s[0]]=mval(d,s[2]); }); return a; }

  var kpiMonth = monthKeys.indexOf("2026-06")>=0?"2026-06":monthKeys[monthKeys.length-1];
  var kpiEntity = "team";

  function renderKpi(){
    var mt=document.getElementById("kpi-months"); mt.innerHTML="";
    monthKeys.forEach(function(k){
      var b=document.createElement("button"); b.className="tab";
      b.innerHTML=esc(mLabel(k))+'<span class="k">'+(k>=KPI.goalStart?"goal":"baseline")+'</span>';
      b.setAttribute("aria-selected", k===kpiMonth?"true":"false");
      b.onclick=function(){ kpiMonth=k; renderKpi(); };
      mt.appendChild(b);
    });
    var per=mPeriod(kpiMonth), goalMonth=kpiMonth>=KPI.goalStart;
    var ents=[["team","Team"]].concat(DES);
    var entName=ents.filter(function(e){return e[0]===kpiEntity;})[0][1];

    // A · secured value (team hero + designer cards)
    var tT=kpiTargets(4), tA=eActuals(per,"team");
    var tSec=tA.tenpct*KPI.avg, tP=Math.round(tSec/tT.secured*100);
    var h='<section><div class="secthead"><h2>Monthly Secured Value · '+esc(mLabel(kpiMonth))+'</h2>'+
      '<span class="owner">'+(goalMonth?"goal month":"baseline — goal from July")+'</span></div>'+
      '<div class="kpi-hero '+pcl(tP)+'"><div class="kh-top"><span>Team</span><span class="kh-pct">'+tP+'% to goal</span></div>'+
      '<div class="kh-num">$'+Math.round(tSec).toLocaleString()+'<span> / $'+tT.secured.toLocaleString()+' target</span></div>'+
      '<div class="ktrack"><div class="kfill '+pcl(tP)+'" style="width:'+Math.min(100,tP)+'%"></div></div>'+
      '<div class="kh-sub">'+tA.tenpct+' projects to 10% (target '+r1(tT.tenpct)+') · actual value = 10% count × $'+KPI.avg.toLocaleString()+' avg check</div></div>'+
      '<div class="grid kpi-grid">';
    DES.forEach(function(d){ var t=kpiTargets(1), a=eActuals(per,d[0]); var s=a.tenpct*KPI.avg, p=Math.round(s/t.secured*100);
      h+='<div class="card"><div class="label">'+esc(d[1])+'</div><div class="val">$'+Math.round(s).toLocaleString()+'</div>'+
        '<div class="kc-sub">/ $'+t.secured.toLocaleString()+' · '+p+'%</div>'+
        '<div class="ktrack sm"><div class="kfill '+pcl(p)+'" style="width:'+Math.min(100,p)+'%"></div></div></div>'; });
    h+='</div></section>';

    // entity selector
    h+='<div class="tabs" id="kpi-ent" role="tablist">';
    ents.forEach(function(e){ h+='<button class="tab" data-e="'+e[0]+'" aria-selected="'+(e[0]===kpiEntity?"true":"false")+'">'+esc(e[1])+'</button>'; });
    h+='</div>';

    // B · funnel table
    var n=kpiEntity==="team"?4:1, T=kpiTargets(n), A=eActuals(per,kpiEntity), chart=[];
    h+='<section><div class="secthead"><h2>Funnel to the KPI · '+esc(entName)+'</h2><span class="owner">target → actual → % to goal</span></div>'+
      '<table class="kpitable"><thead><tr><th>Stage</th><th>Target</th><th>Actual</th><th>Variance</th><th>% to goal</th></tr></thead><tbody>';
    STAGES.forEach(function(s){ var tg=T[s[0]],ac=A[s[0]],v=ac-tg,p=tg?Math.round(ac/tg*100):0;
      h+='<tr><td>'+esc(s[1])+'</td><td>'+r1(tg)+'</td><td>'+ac+'</td><td class="'+(v<0?"neg":"pos")+'">'+(v>=0?"+":"")+r1(v)+'</td><td class="'+pcl(p)+'">'+p+'%</td></tr>';
      chart.push([s[1],p]); });
    var b2c=A.booked?r1(A.conducted/A.booked*100):0, b2cp=Math.round(b2c/T.b2c*100);
    h+='<tr class="rate"><td>Booked → conducted</td><td>'+T.b2c.toFixed(0)+'%</td><td>'+b2c+'%</td><td class="'+((b2c-T.b2c)<0?"neg":"pos")+'">'+((b2c-T.b2c)>=0?"+":"")+r1(b2c-T.b2c)+'</td><td class="'+pcl(b2cp)+'">'+b2cp+'%</td></tr>';
    var c2p=A.conducted?r1(A.proposals/A.conducted*100):0, c2pp=Math.round(c2p/T.c2p*100);
    h+='<tr class="rate"><td>Conducted → proposals</td><td>'+T.c2p.toFixed(0)+'%</td><td>'+c2p+'%</td><td class="'+((c2p-T.c2p)<0?"neg":"pos")+'">'+((c2p-T.c2p)>=0?"+":"")+r1(c2p-T.c2p)+'</td><td class="'+pcl(c2pp)+'">'+c2pp+'%</td></tr>';
    var cv=A.proposals?r1(A.deposits/A.proposals*100):0, cvp=Math.round(cv/T.conv*100);
    h+='<tr class="rate"><td>Proposal → $500 conversion</td><td>'+T.conv.toFixed(2)+'%</td><td>'+cv+'%</td><td class="'+((cv-T.conv)<0?"neg":"pos")+'">'+((cv-T.conv)>=0?"+":"")+r1(cv-T.conv)+'</td><td class="'+pcl(cvp)+'">'+cvp+'%</td></tr>';
    var sA=A.tenpct*KPI.avg, sP=Math.round(sA/T.secured*100), sv=sA-T.secured;
    h+='<tr class="kpi-row"><td>Monthly Secured Value</td><td>$'+T.secured.toLocaleString()+'</td><td>$'+Math.round(sA).toLocaleString()+'</td><td class="'+(sv<0?"neg":"pos")+'">'+(sv>=0?"+":"")+'$'+Math.round(sv).toLocaleString()+'</td><td class="'+pcl(sP)+'">'+sP+'%</td></tr>';
    h+='</tbody></table></section>';
    chart.push(["Secured value",sP]);

    // C · progress chart
    h+='<section><div class="secthead"><h2>Progress to goal · '+esc(entName)+'</h2><span class="owner">% of monthly target</span></div><div class="prog">';
    chart.forEach(function(r){ h+='<div class="prow"><div class="plabel">'+esc(r[0])+'</div>'+
      '<div class="ptrack"><div class="pfill '+pcl(r[1])+'" style="width:'+Math.min(100,r[1])+'%"></div></div>'+
      '<div class="ppct">'+r[1]+'%</div></div>'; });
    h+='</div></section>';

    document.getElementById("kpi-body").innerHTML=h;
    [].forEach.call(document.querySelectorAll("#kpi-ent button"), function(b){ b.onclick=function(){ kpiEntity=b.dataset.e; renderKpi(); }; });
  }

  // ---- mode tabs ----
  var modeEls=document.querySelectorAll(".modetab");
  function setMode(m){
    [].forEach.call(modeEls,function(b){ b.setAttribute("aria-selected", b.dataset.mode===m?"true":"false"); });
    document.getElementById("metrics-view").hidden=(m!=="metrics");
    document.getElementById("kpis-view").hidden=(m!=="kpis");
    if(m==="metrics"){ document.getElementById("subtitle").style.display=""; render(); }
    else { document.getElementById("subtitle").style.display="none"; renderKpi(); }
  }
  [].forEach.call(modeEls,function(b){ b.onclick=function(){ setMode(b.dataset.mode); }; });

  setMode("metrics");
})();
</script>
</body>
</html>
